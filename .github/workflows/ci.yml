name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cpp:
    name: C++ build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake curl

      - name: Ensure nlohmann/json exists
        run: |
          mkdir -p cpp/vendor/nlohmann
          if [ ! -f cpp/vendor/nlohmann/json.hpp ]; then
            curl -L https://github.com/nlohmann/json/releases/download/v3.11.3/json.hpp \
                 -o cpp/vendor/nlohmann/json.hpp
          fi

      - name: Ensure vendored SQLite exists
        run: |
            if [ ! -f cpp/vendor/sqlite3.c ]; then
            echo "sqlite3.c missing — downloading amalgamation 3.45.0"
            mkdir -p cpp/vendor
            curl -fsSL https://www.sqlite.org/2024/sqlite-amalgamation-3450000.zip \
                -o /tmp/sqlite.zip
            unzip -o /tmp/sqlite.zip -d /tmp
            cp /tmp/sqlite-amalgamation-3450000/sqlite3.c cpp/vendor/sqlite3.c
            cp /tmp/sqlite-amalgamation-3450000/sqlite3.h cpp/vendor/sqlite3.h
            else
            echo "sqlite3.c found in vendor"
            fi

      - name: Configure + build
        run: mkdir -p build && cd build && cmake .. && make

      - name: Test
        run: cd build && ctest --output-on-failure

  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r python/requirements.txt

      - name: Generate training data + train models
        run: |
          python data/training_data/simulate_data.py
          python python/models/train_xgb.py
          python python/models/train_rf.py

      - name: Run tests
        run: pytest tests/python/ -v
